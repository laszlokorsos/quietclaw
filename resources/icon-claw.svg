<!--
  QuietClaw app / dock icon.
  Based on "Crab claw" by Lorc, CC BY 3.0, https://game-icons.net/1x1/lorc/crab-claw.html
  - Top serrations and apex fully cut off — the upper pincer terminates
    as a flat/diagonal edge (no upward protrusion).
  - Recoloured to a vertical terracotta gradient for depth.
  - Wrapped in a warm rounded-square tile with a radial-gradient highlight
    and a soft drop shadow under the claw.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- Warm cream tile: gentle highlight at upper-left, soft stone at lower-right. -->
    <radialGradient id="tileBg" cx="38%" cy="26%" r="80%">
      <stop offset="0%" stop-color="#F6F3EC"/>
      <stop offset="100%" stop-color="#D9D2BE"/>
    </radialGradient>
    <!-- Claw fill: warm coral up top → deeper terracotta at the base. -->
    <linearGradient id="clawFill" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#E68A68"/>
      <stop offset="100%" stop-color="#B5593B"/>
    </linearGradient>
    <!-- Soft drop shadow — floats the claw off the tile. -->
    <filter id="clawShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="10"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.32"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#tileBg)"/>
  <g transform="translate(176 176) scale(1.312)" filter="url(#clawShadow)">
    <path fill="url(#clawFill)" d="M127.186 104.469c-23.017 4.384-43.547 11.782-60.124 22.374-24.436 15.613-40.572 37.414-45.5 67.875-4.79 29.62 1.568 68.087 24.125 116.093 93.162 22.88 184.08-10.908 257.25-18.813 37.138-4.012 71.196-.898 96.344 22.97 22.33 21.19 36.21 56.808 41.908 113.436 29.246-35.682 44.538-69.065 49.343-99.594 5.543-35.207-2.526-66.97-20.31-95.593-8.52-13.708-19.368-26.618-32-38.626l-27.001-22.375c-8.637-6.278-17.765-12.217-27.314-17.782l-45.187-22.376a423.505 423.505 0 0 0-38.158-13.812l-66-14.78c-9.344-1.316-18.625-2.333-27.812-2.97l-79.564 3.969zM222 325.345c-39.146 7.525-82.183 14.312-127.156 11.686 47.403 113.454 207.056 224.082 260.125 87-101.18 33.84-95.303-49.595-132.97-98.686z"/>
  </g>
</svg>
