<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Lobster claw pincer — closed (idle) -->
  <!-- Asymmetric: thick upper arm, thinner lower jaw, tips nearly touching on right -->

  <!-- Upper arm (thick, dominant) -->
  <path fill="#000" d="
    M 26 14
    C 23.5 10, 19 7, 14 5.5
    C 9 4.5, 5 7, 4 12
    C 3 17, 5 22, 9 24
    L 9 18
    C 9 14, 11.5 11, 15 10.5
    C 18 10, 22 11, 26 14
    Z
  "/>

  <!-- Lower jaw (thinner, tips close the gap) -->
  <path fill="#000" d="
    M 26 15
    C 22 17.5, 18 18.5, 15 18
    C 11.5 17.5, 9 19.5, 9 22
    L 9 24
    C 13 26.5, 18 27.5, 22 26.5
    C 26 25.5, 28.5 22, 28 18.5
    C 28 16.5, 27 15, 26 15
    Z
  "/>
</svg>
