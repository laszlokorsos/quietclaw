# QuietClaw Configuration
# See https://github.com/laszlokorsos/quietclaw for documentation

[general]
data_dir = "~/.quietclaw/meetings"
markdown_output = true             # Generate human-readable .md files alongside JSON
launch_at_login = true             # Start QuietClaw automatically when you log in
# user_name = "Your Name"          # Override the display name for your mic segments.
                                   # Empty / unset = auto-detect from calendar self-attendee,
                                   # config, $USER, then "Me".

[audio]
sample_rate = 48000                # Hz — native Core Audio rate. WebRTC AEC3 (the echo canceller
                                   # in our native addon) runs at full bandwidth, so we keep the
                                   # 8–24 kHz band that modern STT models (Deepgram Nova-3,
                                   # AssemblyAI v3) use for sibilants and consonant detail.
buffer_flush_interval_ms = 200     # How often buffered audio is flushed to STT (ms)
echo_cancellation = true           # WebRTC AEC3 on the mic path. Reference signal is the
                                   # system audio captured via ScreenCaptureKit.
agc = true                         # Automatic gain control (only applied when AEC3 is on)

[tuning]
deepgram_utterance_end_ms = 1000   # Silence duration before Deepgram finalizes an utterance
deepgram_endpointing_ms = 300      # Endpointing sensitivity (lower = faster, may split utterances)
bleed_time_window_sec = 3.0        # Time window for mic bleed dedup (safety net behind AEC)
bleed_similarity_threshold = 0.4   # Word overlap % to consider mic segment as bleed
bleed_min_words = 2                # Skip bleed dedup for very short segments
merge_gap_threshold_sec = 1.0      # Merge adjacent same-speaker segments if gap < this
meeting_debounce_count = 3         # Consecutive "missed" polls before stopping auto-record

# Add calendar accounts here, or use the UI to connect them via OAuth.
# [[calendar.accounts]]
# label = "Work"
# provider = "google"
# email = "you@company.com"
# enabled = true

[calendar.settings]
sync_interval_minutes = 5
lookahead_minutes = 15
use_for_auto_detect = true
use_for_speaker_id = true

[stt]
provider = "deepgram"              # deepgram | assemblyai (AssemblyAI is the automatic fallback
                                   # when Deepgram fails to connect — both keys can be set.)

[stt.deepgram]
model = "nova-3"
language = "en"
diarize = true

[summarization]
enabled = true                     # Set to false for raw transcript only
provider = "anthropic"             # Only "anthropic" is supported today
model = "claude-haiku-4-5-20251001"
# The prompt itself is not stored in this TOML (it's multiline and would be
# awkward to edit here). To override it, write your custom prompt to
# ~/.quietclaw/summarization-prompt.txt — the app reads that file when it
# exists and non-empty, falling back to the built-in default otherwise. You
# can also edit it from Settings → Summarization inside the app.

[notifications]
on_meeting_processed = true
desktop_notifications = true
