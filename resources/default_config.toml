# QuietClaw Configuration
# See https://github.com/laszlokorsos/quietclaw for documentation

[general]
data_dir = "~/.quietclaw/meetings"
retain_audio = false               # Audio files are large; enable only if you need playback
audio_format = "opus"              # opus (tiny, lossy) | flac (lossless) | wav (uncompressed)
audio_retention_days = 30          # Only applies when retain_audio = true
markdown_output = true             # Generate human-readable .md files alongside JSON
launch_at_login = true             # Start QuietClaw automatically when you log in

[audio]
sample_rate = 48000                # Hz — Deepgram nova-3 accepts up to 48kHz natively
buffer_flush_interval_ms = 200     # How often buffered audio is flushed to STT (ms)
echo_cancellation = true           # Apple Voice Processing echo cancellation on mic input
agc = true                         # Automatic gain control (when echo cancellation is on)
disable_echo_cancellation_on_headphones = true  # Skip AEC when headphones detected (no bleed)

[tuning]
deepgram_utterance_end_ms = 1000   # Silence duration before Deepgram finalizes an utterance
deepgram_endpointing_ms = 300      # Endpointing sensitivity (lower = faster, may split utterances)
bleed_time_window_sec = 3.0        # Time window for mic bleed dedup (safety net behind AEC)
bleed_similarity_threshold = 0.5   # Word overlap % to consider mic segment as bleed
bleed_min_words = 2                # Skip bleed dedup for very short segments
merge_gap_threshold_sec = 1.0      # Merge adjacent same-speaker segments if gap < this
meeting_debounce_count = 3         # Consecutive "missed" polls before stopping auto-record

[consent]
auto_message_enabled = false       # Auto-send a consent message in meeting chat
auto_message_text = "I'm using QuietClaw to transcribe this meeting for my notes."
platforms = ["google_meet", "zoom"]

# Add calendar accounts here, or use the UI to connect them via OAuth.
# [[calendar.accounts]]
# label = "Work"
# provider = "google"
# email = "you@company.com"
# enabled = true

[calendar.settings]
sync_interval_minutes = 5
lookahead_minutes = 15
use_for_auto_detect = true
use_for_speaker_id = true

[stt]
provider = "deepgram"              # deepgram (MVP). Additional providers in Phase 2.

[stt.deepgram]
model = "nova-3"
language = "en"
diarize = true

[summarization]
enabled = true                     # Set to false for raw transcript only
provider = "anthropic"             # anthropic | openai | ollama
model = "claude-haiku-4-5-20251001"
custom_prompt = ""
extract_actions = true
extract_decisions = true
extract_topics = true

[summarization.ollama]
endpoint = "http://localhost:11434"
model = "llama3.1"

[api]
enabled = true
port = 19832

[notifications]
on_meeting_processed = true
desktop_notifications = true
