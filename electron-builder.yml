appId: com.quietclaw.app
productName: QuietClaw
directories:
  buildResources: resources
  output: dist
files:
  - out/**/*
  - native/build/Release/*.node
  - "!node_modules/**/*"
  - node_modules/better-sqlite3/**/*
  - node_modules/bindings/**/*
  - node_modules/file-uri-to-path/**/*
  - "!node_modules/better-sqlite3/{deps,src}/**"
asar: true
asarUnpack:
  - "**/*.node"
npmRebuild: true
extraResources:
  - from: resources/default_config.toml
    to: default_config.toml
  - from: resources/tray-icon.png
    to: tray-icon.png
  - from: resources/tray-icon@2x.png
    to: tray-icon@2x.png
  - from: resources/tray-icon-recording.png
    to: tray-icon-recording.png
  - from: resources/tray-icon-recording@2x.png
    to: tray-icon-recording@2x.png
mac:
  category: public.app-category.productivity
  icon: resources/icon.png
  # One DMG that runs on both Apple silicon and Intel. The native audio addon
  # links a universal libwebrtc-audio-processing.a, better-sqlite3 ships Intel
  # + arm64 prebuilds, and Electron's own arch-split binaries are merged by
  # electron-builder at package time.
  target:
    - target: dmg
      arch: universal
    - target: zip
      arch: universal
  hardenedRuntime: true
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
  extendInfo:
    NSMicrophoneUsageDescription: "QuietClaw needs microphone access to capture your voice during meetings."
dmg:
  artifactName: "${productName}-${version}.${ext}"
